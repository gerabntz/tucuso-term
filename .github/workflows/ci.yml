name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Constraint policy + eval suite (immutable — never skip or xfail)
        # Covers: M4 schema shield (AC2), M3/N3 lockfile, M1 quorum e2e (AC1),
        # M8 history immutability (AC6), M6 budget + no-third-party (AC4),
        # M12 pinned seeds / fail-loud importers, M9/M10 tokens & magic links.
        run: pytest -v
